name: assignfilament
description: "CRAV3D Assist — internal iOS and Android app for the SpoolBuddy filament-assignment workflow."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  auto_size_text: ^3.0.0
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  crypto: ^3.0.3
  flutter_secure_storage: ^9.2.3
  provider: ^6.1.2
  mobile_scanner: ^7.2.0
  local_auth: ^2.3.0
  flutter_svg: ^2.0.9
  glass_kit: ^4.0.2
  flutter_villains: ^2.0.0
  awesome_snackbar_content: ^0.1.8
  floaty_nav_bar: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  local_auth_platform_interface: ^1.1.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/brand/CRAV3D.svg
    - assets/ui/ams_body.png
    - assets/ui/ams_spool.png
    - assets/ui/ams_frame.png
  fonts:
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-VariableFont_wght.ttf
        - asset: assets/fonts/PlusJakartaSans-Italic-VariableFont_wght.ttf
          style: italic
